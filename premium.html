<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Relatório Premium - Instinto Superior</title>
    <style>
        /* CSS REFINADO - CORES DO SEU GERADOR */
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #f1f5f9; margin: 0; color: #1e293b; line-height: 1.6; }
        .relatorio { max-width: 950px; margin: 40px auto; background: white; padding: 70px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        .capa { text-align: center; page-break-after: always; margin-bottom: 50px; }
        .logo { max-width: 320px; margin-bottom: 20px; }
        
        h1 { font-size: 32px; text-transform: uppercase; color: #0f172a; text-align: center; }
        h2 { font-size: 24px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; margin-top: 50px; color: #334155; }
        
        .texto { text-align: justify; font-size: 16.5px; margin: 20px 0; }
        
        /* BARRAS */
        .barra-item { margin-bottom: 15px; }
        .barra-bg { background: #f1f5f9; height: 12px; border-radius: 6px; overflow: hidden; width: 100%; border: 1px solid #e2e8f0; }
        .barra-fill { height: 100%; width: 0%; transition: width 1s ease-in-out; }
        
        .fisico { background: #ef4444; }
        .mental { background: #3b82f6; }
        .emocional { background: #22c55e; }
        .intuitivo { background: #eab308; }
        .criativo { background: #9333ea; }
        .indeciso { background: #fb923c; }
        .neutro { background: #B89A9A; }

        .bloco-ano { border: 1px solid #e2e8f0; padding: 30px; border-radius: 12px; margin-bottom: 40px; page-break-inside: avoid; background: #fcfcfc; }
        .transito-tag { background: #0f172a; color: #ffd633; padding: 8px 15px; border-radius: 5px; font-weight: bold; display: inline-block; margin: 10px 0; }

        @media print { .no-print { display: none; } .relatorio { box-shadow: none; margin: 0; width: 100%; padding: 40px; } }
    </style>
</head>
<body>

<div class="relatorio">
    <div class="no-print" style="text-align: right;"><button onclick="window.print()">GERAR PDF</button></div>

    <div class="capa">
        <img src="https://hemricciinstintosuperior-rcci.github.io/Trabalho_venda_Numerologia/plano.png" class="logo">
        <h1 id="nomePessoa"></h1>
        <p>Data de Nascimento: <strong id="dataPessoa"></strong></p>
    </div>

    <h2>1. Plano Natural (Estrutural)</h2>
    <div class="barra-item">Físico <div class="barra-bg"><div id="barFisicoNat" class="barra-fill fisico"></div></div></div>
    <div class="barra-item">Mental <div class="barra-bg"><div id="barMentalNat" class="barra-fill mental"></div></div></div>
    <div class="barra-item">Emocional <div class="barra-bg"><div id="barEmocionalNat" class="barra-fill emocional"></div></div></div>
    <div class="barra-item">Intuitivo <div class="barra-bg"><div id="barIntuitivoNat" class="barra-fill intuitivo"></div></div></div>
    <div id="textoNatural" class="texto"></div>

    <h2>2. Perfil de Expressão Natural</h2>
    <div class="barra-item">Criativo <div class="barra-bg"><div id="barCriativoNat" class="barra-fill criativo"></div></div></div>
    <div class="barra-item">Indeciso <div class="barra-bg"><div id="barIndecisoNat" class="barra-fill indeciso"></div></div></div>
    <div class="barra-item">Neutro <div class="barra-bg"><div id="barNeutroNat" class="barra-fill neutro"></div></div></div>
    <div id="textoExpressaoNat" class="texto"></div>

    <h2>3. Análise Neurocognitiva Natural</h2>
    <div id="dominanciaNat" style="text-align: center; font-weight: bold; font-size: 20px; margin-bottom: 15px;"></div>
    <div id="analiseNeuroNat" class="texto"></div>

    <h2 style="margin-top: 100px;">4. Cronologia de Destino (100 Anos)</h2>
    <div id="cronologiaCont"></div>

    <div style="text-align: center; margin-top: 80px; border-top: 1px solid #eee; padding-top: 40px;">
        <img src="https://hemricciinstintosuperior-rcci.github.io/Matriz_quantica_da_vida/ícone-512.jpg" style="width:70px;">
        <p><strong>Instinto Superior</strong><br>© 2026</p>
    </div>
</div>

<script>
    const dados = JSON.parse(localStorage.getItem("relatorioMapa"));

    if(dados) {
        // Cabeçalho
        document.getElementById("nomePessoa").innerText = dados.nome.toUpperCase();
        document.getElementById("dataPessoa").innerText = dados.data;

        // Injeção de Texto (Usando nomes exatos do seu Index)
        document.getElementById("textoNatural").innerHTML = dados.textoNatural;
        document.getElementById("textoExpressaoNat").innerHTML = dados.textoExpressaoNat;
        document.getElementById("dominanciaNat").innerHTML = dados.dominanciaNat;
        document.getElementById("analiseNeuroNat").innerHTML = dados.analiseNeuroNat;

        // Lógica das Barras Naturais (Puxando do pacote exportado)
        function ajustarBarra(id, valor, max) {
            let p = (valor / (max || 1)) * 100;
            document.getElementById(id).style.width = p + "%";
        }

        // No seu Index, os valores naturais estão em fisicoNat, mentalNat...
        let maxNat = Math.max(dados.fisicoNat, dados.mentalNat, dados.emocionalNat, dados.intuitivoNat) || 1;
        ajustarBarra("barFisicoNat", dados.fisicoNat, maxNat);
        ajustarBarra("barMentalNat", dados.mentalNat, maxNat);
        ajustarBarra("barEmocionalNat", dados.emocionalNat, maxNat);
        ajustarBarra("barIntuitivoNat", dados.intuitivoNat, maxNat);

        // Barras de Expressão Natural
        let maxExp = Math.max(dados.criativoNat, dados.indecisoNat, dados.neutroNat) || 1;
        ajustarBarra("barCriativoNat", dados.criativoNat, maxExp);
        ajustarBarra("barIndecisoNat", dados.indecisoNat, maxExp);
        ajustarBarra("barNeutroNat", dados.neutroNat, maxExp);

        // Renderização dos 100 Anos
        const cont = document.getElementById("cronologiaCont");
        dados.ciclos.forEach(ano => {
            const div = document.createElement("div");
            div.className = "bloco-ano";
            
            const maxAno = Math.max(ano.fisico, ano.mental, ano.emocional, ano.intuitivo) || 1;
            
            div.innerHTML = `
                <h3 style="margin-top:0;">ANO ${ano.ano} (${ano.intervalo})</h3>
                <div class="transito-tag">Vibração ${ano.transitoNum} - ${ano.transitoTexto}</div>
                
                <div class="barra-item"><small>Físico</small> <div class="barra-bg"><div class="barra-fill fisico" style="width:${(ano.fisico/maxAno)*100}%"></div></div></div>
                <div class="barra-item"><small>Mental</small> <div class="barra-bg"><div class="barra-fill mental" style="width:${(ano.mental/maxAno)*100}%"></div></div></div>
                <div class="barra-item"><small>Emocional</small> <div class="barra-bg"><div class="barra-fill emocional" style="width:${(ano.emocional/maxAno)*100}%"></div></div></div>
                <div class="barra-item"><small>Intuitivo</small> <div class="barra-bg"><div class="barra-fill intuitivo" style="width:${(ano.intuitivo/maxAno)*100}%"></div></div></div>
                
                <div class="texto">${ano.textoMomento}</div>
            `;
            cont.appendChild(div);
        });
    } else {
        alert("Erro: Dados não encontrados no sistema. Gere o mapa novamente.");
    }
</script>
</body>
</html>
