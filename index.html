/* Cor Especial para o Regente da Vida - FORMATO TRIÂNGULO */
.num.regente-destaque {
    background: none !important;
    color: #827108 !important;
    font-weight: 900 !important;
    border: none !important;
    box-shadow: none !important;
    position: relative;
    z-index: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 40px;  /* Ajuste a largura se precisar */
    height: 40px; /* Ajuste a altura se precisar */
}

.num.regente-destaque::before {
    content: "";
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    /* Aqui acontece a mágica do triângulo invertido */
    border-left: 22px solid transparent;  /* Lado esquerdo */
    border-right: 22px solid transparent; /* Lado direito */
    border-top: 38px solid #ffffff;       /* Fundo Branco do triângulo */
    filter: drop-shadow(0 0 5px rgba(184, 134, 11, 0.6)); /* Brilho dourado */
    z-index: -1;
}

/* Opcional: Se quiser uma bordinha fina no triângulo */
.num.regente-destaque::after {
    content: "";
    position: absolute;
    top: -2px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 24px solid transparent;
    border-right: 24px solid transparent;
    border-top: 41px solid #827108; /* Cor da "borda" dourada */
    z-index: -2;
}

    background-image:

    justify-content: center;

    text-align: center;

@media print {
    /* 1. Criamos um "reset" para as capas de transição */
    .capa, .capa-transicao {
        page-break-before: always !important;
        page-break-after: always !important;
        /* Força a capa a ignorar as margens padrão do PDF para ocupar a folha toda */
        margin: 0 !important; 
        padding: 0 !important;
        height: 297mm !important;
    }

    /* 2. Removemos o cabeçalho/rodapé (incluindo numeração) nestas páginas específicas */
    /* Nota: Como o CSS padrão não permite selecionar @page por classe de elemento, 
       usamos o truque de esconder qualquer elemento que renderize a numeração 
       ou forçamos uma margem que "jogue" o número para fora se ele estiver no corpo. */

    .capa-transicao {
        /* Se você estiver usando um elemento HTML para simular a numeração, 
           garanta que ele tenha uma classe como '.numero-pagina' e use: */
        counter-increment: none !important; 
    }

    /* 3. A regra de ouro para PDFs modernos (Chrome/Edge):
       Isso remove os cabeçalhos e rodapés automáticos do navegador (Data, Título e URL) */
    @page {
        margin: 1.5cm; /* Margem padrão para páginas de conteúdo */
    }

    /* Definimos que a PRIMEIRA página e qualquer página com a classe capa/transição 
       não deve exibir os seletores de margem que contêm o contador */
    
    .capa, .capa-transicao {
        /* Isso garante que o conteúdo da capa cubra qualquer elemento de numeração 
           que o navegador tente inserir por baixo */
        position: relative;
        z-index: 9999;
        background-color: #0f2a36 !important;
    }
}

function calcularValorLetra(letra) {
    const base = letra.normalize("NFD")[0].toUpperCase();
    const valorBase = tabela[base] || 0;
    if (!valorBase) return 0;

    let soma = 0, mult = 1, norm = letra.normalize("NFD");

    for (let i = 1; i < norm.length; i++) {
        const c = norm[i];
        
        if (c === "\u0301") soma += 2;          // Agudo (´)
        else if (c === "\u0302") soma += 7;     // Circunflexo (^)
        else if (c === "\u0303") soma += 3;     // Til (~)
        else if (c === "\u0327") soma += 3;     // Cedilha (¸)
        else if (c === "\u030a") soma += 7;     // Círculo/Grau superior (°)
        else if (c === "\u0300" || c === "\u0308") mult *= 2; // Grave/Trema
    }

    // Verificação do Apóstrofo (')
    // Como o apóstrofo não é um diacrítico combinante na normalização NFD padrão,
    // verificamos se ele existe na string original.
    if (letra.includes("'")) {
        soma += 2;
    }

    return (valorBase + soma) * mult;
}  
 
function valorLetraMatriz(l){
    let n = l.normalize("NFD");
    let v = mapaMatriz[n[0].toUpperCase()] ?? 0;
    let s = 0;

    // Lógica de acentos (Soma)
    if (n.includes("\u0301")) s = 2;          // Agudo
    else if (n.includes("\u0302")) s = 7;     // Circunflexo
    else if (n.includes("\u0303")) s = 3;     // Til
    else if (n.includes("\u0327")) s = 3;     // Cedilha
    else if (n.includes("\u030a")) s = 7;     // Grau (°)
    else if (l.includes("'")) s = 2;          // Apóstrofo

    // Lógica de multiplicadores (Grave ou Trema)
    return (v + s) * (n.includes("\u0300") || n.includes("\u0308") ? 2 : 1);
}

const particulas = [
    // Português e Espanhol
    'de', 'da', 'do', 'das', 'dos', 'del', 'de la', 'de las', 'de lo', 'de los', 'y', 'e',
    
    // Italiano (Muitas variações com apóstrofo)

    // Francês
    'du', 'des', 'le', 'la', 'l', 'de la', 'de l', 'd',
    
    // Alemão e Holandês (Comuns em sobrenomes do sul do Brasil)
    'von', 'van', 'vander', 'vanden', 'vane', 'vom', 'zu', 'zur', 'zum', 'auf', 'der',
    
    // Inglês/Escocês/Irlandês (Aglutinados ou prefixos)

    // Árabe (Muito comum em nomes brasileiros de origem libanesa/síria)
    'al', 'el', 'bin', 'ben', 'abd'
];

    let nomeProcessado = nome.trim(); // Mantém as maiúsculas originais

    particulas.forEach(p => {
        // O segredo está na flag 'gi' da RegExp:
        // 'g' = global (todas as vezes que aparecer)
        // 'i' = insensitive (ignora se é maiúsculo ou minúsculo)
        const regexEspaco = new RegExp('\\b' + p + '\\s+', 'gi');
        
        // Usamos uma função no replace para manter a escrita original da partícula

        nomeProcessado = nomeProcessado.replace(regexEspaco, (match) => {

        });
    });

    return nomeProcessado;

function detectarNegativas(linhas) {
    let detalhes = [];
    let pos = [];
    let numsSet = new Set();

    linhas.forEach((linha, i) => {
        let j = 0;
        while (j < linha.length) {
            let num = linha[j];
            let cont = 1;
            while (j + cont < linha.length && linha[j + cont] === num) { cont++; }

            if (cont >= 3) {
                numsSet.add(num);
                // Calcula o deslocamento (offset) para alinhar com as colunas do topo
                let offset = Math.floor(i / 2); 
                detalhes.push({
                    numero: num,
                    colunaInicio: j + offset,
                    repeticoes: cont,
                    linha: i
                });
                for (let k = j; k < j + cont; k++) pos.push({ l: i, c: k });
                j += cont;
            } else { j++; }
        }
    });
    return { pos, nums: [...numsSet], detalhes };
}

                if (linhas[i + 1][j] === 9) {

function calcularNumerologia(valor, aceitaMestre = true) {
    let num = parseInt(valor);
    if (isNaN(num)) return 0;

    // Criamos um array com todos os potenciais que você deseja preservar
    const mestresSoberanos = [11, 22, 33, 44, 55, 66, 77, 88, 99];

    while (num > 9) {

        if (aceitaMestre && mestresSoberanos.includes(num)) {
            break;

        num = String(num).split('').reduce((acc, curr) => acc + parseInt(curr), 0);

        pNome = "MASCULINO-FEMININO-NEUTRO";

}

function aplicarFiltroNomeComposto(texto) {
    // Se o texto não existir, for nulo ou não for uma string, retorna vazio
    if (!texto || typeof texto !== 'string') {
        return ""; 
    }

    // Pega o valor do input, remove espaços inúteis e divide por espaços
    let partesNome = document.getElementById("nome").value.trim().split(/\s+/);
    
    // Pega os dois primeiros elementos e junta com um espaço
    // Se só houver um nome, o join lidará com isso graciosamente
    let pNome = partesNome.slice(0, 2).join(' ') || "MASCULINO-FEMININO-NEUTRO";

    // Retorna o texto substituindo a tag pelo nome em negrito
    return texto.replace(/MASCULINO-FEMININO-NEUTRO/gi, `<strong>${pNome}</strong>`);
}
        
// Função para calcular o Desejo Oculto usando a SUA 'tabela' Cabalística
function calcularDesejoOculto(nome) {
    const contagem = {};
    // Limpa o nome e deixa em maiúsculo para bater com a sua const tabela
    const nomeLimpo = nome.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
    
    for (let letra of nomeLimpo) {
        if (tabela[letra]) { // AQUI: Usando o nome exato da sua constante
            const num = tabela[letra];
            contagem[num] = (contagem[num] || 0) + 1;
        }
    }
    
    let maxRepeticoes = 0;
    let numeroDesejo = 0;
    for (const n in contagem) {
        if (contagem[n] > maxRepeticoes) {
            maxRepeticoes = contagem[n];
            numeroDesejo = n;
        }
    }
    return { numero: numeroDesejo, qtd: maxRepeticoes };
}



        
function calcularIntensidadeAtributo(nums, resultados, faltantes, nomeRaw, d3, regenteMatriz, negativasMatriz, vibPlano, statusPlano, dominantePerfil, planoAtual,desejoOculto) {
    let nota = 5.5; 

    // MOTOR DE STATUS
    if (statusPlano === "forte") nota += 2.18; 
    else if (statusPlano === "medio") nota += 1.53;
    else if (statusPlano === "fraco") nota -= 2.13;

    // MODULAÇÃO POR PERFIL
    const perfil = (dominantePerfil || "neutro").toLowerCase();
    if (perfil === "criativo") nota += 1.33;
    else if (perfil === "neutro") nota += 1.25;
    else if (perfil === "indeciso") nota -= 1.23;

    // DNA E SOMBRAS
    let dnaPositivo = [
        resultados.motivacao, resultados.Personalidade, resultados.influencia, 
        resultados.comportamento, resultados.CaminhodeVida, resultados.Propósito, 
        resultados.subconsciente, resultados.dia, resultados.equilibrio, 
        resultados.talento, resultados.essencia,resultados.talentosEspeciais, regenteMatriz];
    
    let sombras = [resultados.deficitRecorrente, d3].concat(resultados.deficitsOcultos || [], negativasMatriz);

    // TABELA DE PONTOS (Normalizada internamente para evitar o erro de leitura)
    const tabelaPontos = {
        "fisico": { "criativo": [5], "indeciso": [6], "neutro": [4] },
        "mental": { "criativo": [1], "indeciso": [1, 5, 8], "neutro": [3] },
        "emocional": { "criativo": [1, 7, 2], "indeciso": [2, 3, 4, 6] },
        "intuitivo": { "criativo": [2], "indeciso": [6, 8, 1], "neutro": [3, 6] }
    };

    // Normaliza o nome do plano para minúsculo e sem acento para ler a tabela acima
    const planoBusca = planoAtual.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

    nums.forEach(n => {
        let pesoDNA = 0.8;
        
        // Verifica ressonância no perfil (Usando a chave normalizada)
        if (tabelaPontos[planoBusca] && tabelaPontos[planoBusca][perfil] && tabelaPontos[planoBusca][perfil].includes(n)) {
            nota += 1.0;
        }

        if (n === vibPlano && statusPlano !== "fraco") nota += 1.0;

        nota += (dnaPositivo.filter(num => num === n).length * pesoDNA);
        nota -= (sombras.filter(num => num === n).length * 1.5);
        
        if (faltantes.includes(n.toString()) || faltantes.includes(Number(n))) {
            nota -= 1.2;
        }
    });

    return Math.min(Math.max(nota, 1.78), 9.87);
}
// --- NOVO MOTOR DE GRÁFICOS DINÂMICOS (PLANOS DE EXPRESSÃO) ---

function calcularIntensidadeMomento(configAtributo, res, faltantes, nomeRaw, d3, regenteMatriz, negativasMatriz, vibPlano, statusPlano, dominantePerfil, planoAtual, idadeCronologica, fim1, fim2) {
    
    // 1. NOTA BASE (O que ele trouxe ao nascer)
    let nota = calcularIntensidadeAtributo(configAtributo.nums, res, faltantes, nomeRaw, d3, regenteMatriz, negativasMatriz, vibPlano, statusPlano, dominantePerfil, planoAtual);

    // 2. MODIFICADORES DE TEMPO (O "CLIMA" ATUAL)
    const anoP = res.anoPessoal;
    const desafioPrincipal = d3; // Aqui usamos o d3 que vem do parâmetro (sem redeclarar)
    
    // --- LÓGICA AUTOMÁTICA DE CICLOS POR IDADE ---
    let cicloAtivo, momentoAtivo, desafioTemporarioAtivo;

    if (idadeCronologica <= fim1) {
        // Fase 1
        cicloAtivo = res.ciclos[1];
        momentoAtivo = res.momentos[1];
        desafioTemporarioAtivo = res.desafios[1];
    } else if (idadeCronologica <= fim2) {
        // Fase 2
        cicloAtivo = res.ciclos[2];
        momentoAtivo = res.momentos[2]; 
        desafioTemporarioAtivo = res.desafios[2];
    } else {
        // Fase 3 (Maturidade)
        cicloAtivo = res.ciclos[3];
        momentoAtivo = res.momentos[4]; 
        desafioTemporarioAtivo = 0; 
    }

    configAtributo.nums.forEach(n => {
        // BÔNUS: Ativação pelo ANO PESSOAL
        if (n === anoP) nota += 0.35;

        // BÔNUS: Ciclo e Momento que o cliente vive HOJE (Automático)
        if (n === cicloAtivo) nota += 0.25;
        if (n === momentoAtivo) nota += 0.35;

        // ÔNUS: Desafio Principal (Aquele d3 que deu erro antes)
        if (n === desafioPrincipal) nota -= 0;

        // ÔNUS: Desafio Temporário da fase atual
        if (n === desafioTemporarioAtivo) nota -= 0.25;
    });

    // Mantém a nota entre 1.0 e 9.6 para o gráfico não quebrar
    return Math.min(Math.max(nota, 1.78), 9.87);
}

function calcularDadosPlanos(nome) {
    let soma = { fisico: 0, mental: 0, emocional: 0, intuitivo: 0 };
    let contPerfil = { criativo: 0, indeciso: 0, neutro: 0 };
    
    for(let l of nome.toUpperCase()) {
        let letraBase = l.normalize("NFD")[0];
        let valor = calcularValorLetra(l);
        for(let p in gruposPlanos) {
            if(gruposPlanos[p].includes(letraBase)) {
                soma[p] += valor;
                break;
            }
        }
        if (tabelaExpressao[letraBase]) contPerfil[tabelaExpressao[letraBase]]++;
    }
    
    // Cria o ranking de potências (do maior para o menor)
    const ranking = Object.entries(soma).sort((a, b) => b[1] - a[1]);
    
    return { 
        soma, 
        maior: ranking[0][1], 
        contPerfil, 
        dominantePerfil: Object.keys(contPerfil).reduce((a, b) => contPerfil[a] >= contPerfil[b] ? a : b),
        forcaPrincipal: ranking[0][0], // O plano com mais pontos
        desafioAtual: ranking[3][0]    // O plano com menos pontos
    };
}

        const partes = nomeParaCalculo.toUpperCase().trim().split(/\s+/);
        let timelines = partes.map(p => {
            let t = [];
            for(let l of p) { 
                let v = calcularValorLetra(l); 
                for(let i=0; i<v; i++) t.push(l); 
            }
            return t;
        });

        // RESET DOS CONTADORES PARA CADA ANO
        let somaMomento = { fisico: 0, mental: 0, emocional: 0, intuitivo: 0 };
        let contPerfilMomento = { criativo: 0, indeciso: 0, neutro: 0 };

        timelines.forEach((t) => {
            let letraAtiva = t[indiceAno % t.length];
            if (letraAtiva) {
                const plano = descobrirPlano(letraAtiva);
                if (plano) somaMomento[plano] += calcularValorLetra(letraAtiva);
                
                let letraBase = letraAtiva.normalize("NFD")[0].toUpperCase();
                // Acessa a tabela de expressão global
                if (typeof tabelaExpressao !== 'undefined' && tabelaExpressao[letraBase]) {
                    contPerfilMomento[tabelaExpressao[letraBase]]++;
                }
            }
        });
        
        // Determina o Perfil de Ação do ano
        let dominanteMomento = Object.keys(contPerfilMomento).reduce((a, b) => 
            contPerfilMomento[a] >= contPerfilMomento[b] ? a : b
        );

        const nomesAmigaveis = { fisico: "Físico", mental: "Mental", emocional: "Emocional", intuitivo: "Intuitivo" };

            <div style="margin: 25px 0; padding: 20px; border: 2px solid #827108; border-radius: 12px; background: #fff;">
                <h4 style="margin: 0; color: #827108; text-transform: uppercase; font-size:20px;">Perfil de Ação: ${dominanteMomento}</h4>
                <div style="font-size: 18px; color: #444; line-height:1.6;">${aplicarFiltroTexto(descricoesPerfilMomento[dominanteMomento])}</div>
            </div>

            <div style="margin: 30px 0;">`;

        
        h += `<div class="evitar-corte">`; 
        // Gráficos de barras
        for(let p in somaMomento) {
            let porcentagem = Math.max((somaMomento[p] / ref) * 100, 10);
            let valorReduzido = reduzirPuro(somaMomento[p]);
            const degradês = {
                fisico: 'linear-gradient(to right, #e74c3c, #7b241c)',
                mental: 'linear-gradient(to right, #3498db, #1a5276)',
                emocional: 'linear-gradient(to right, #2ecc71, #0a3d1d)',
                intuitivo: 'linear-gradient(to right, #f1c40f, #b8860b)'
            };
            h += `
                <div style="margin: 0 auto 20px auto; width: 85%;  height: 42px; position: relative;  display: flex; align-items: center; justify-content: center;break-inside: avoid; page-break-inside: avoid; margin-top: 10px;">
                    <div style="width:${porcentagem}%; height:100%; background: ${degradês[p]}; position: absolute; left: 0; top: 0; z-index: 1;"></div>
                    <span style="color: #fff; font-weight: bold; text-shadow: 1px 1px 2px #000; z-index: 2; text-transform: uppercase; letter-spacing:1px;">
                        ${nomesAmigaveis[p]} EXP ${valorReduzido}
                    </span>
                </div>`;
        }
        h += `</div>`;
 h += `</div>`; 
        

        // CHAMADA DOS TEXTOS DO textosPlanosMomento
        h += `<div style="margin-top: 30px;">`;
        for(let p in somaMomento) {
            let r = somaMomento[p] / ref;
            let intensidade = (r > 0.75) ? "forte" : (r >= 0.50) ? "medio" : "fraco";
            let vFinal = reduzirPuro(somaMomento[p]);
            
            // Tenta buscar o texto de forma segura
            let textoEncontrado = "";
            try {
                if (typeof textosPlanosMomento !== 'undefined' && textosPlanosMomento[p]) {
                    textoEncontrado = textosPlanosMomento[p][intensidade][vFinal] || "";
                }
            } catch(e) { console.log("Erro ao buscar texto do plano:", p); }

            if (textoEncontrado) {
h += `
                    <div class="evitar-corte" style="margin-bottom: 30px; border-left: 5px solid var(--gold); padding-left: 20px; background: #fdfdfd; padding-top: 10px; padding-bottom: 10px;">
                        <h4 style="margin:0 0 10px 0; color:${coresPlanos[p]}; text-transform:uppercase; font-size:24px;">${nomesAmigaveis[p]} (${intensidade})</h4>
                        <div style="font-size:18px; line-height:1.6;">${aplicarFiltroTexto(textoEncontrado)}</div>
                    </div>`;
            }
        }
        h += `</div>`;

        // TRÂNSITO VIBRACIONAL
        let letrasAno = timelines.map(t => t[indiceAno % t.length]);
        let vTransito = reduzirPuro(letrasAno.reduce((s, l) => s + calcularValorLetra(l), 0));
        let txtTransito = (typeof TextosTransito !== 'undefined') ? (TextosTransito[vTransito] || "") : "";

h += `
            <div class= style="margin-top:60px; background:#fff; color:#000; padding:30px;">
                <h3 style="color:var(--gold); margin:0 0 15px 0; text-transform:uppercase;">TRÂNSITO VIBRACIONAL: ${vTransito}</h3>
                <div style="font-size:18px; line-height:1.6; color:#111;">${aplicarFiltroTexto(txtTransito)}</div>
            </div>
        </div>`;

        return h;
    };

    if (idadeForcada !== null) {
        return { html: processarUmCiclo(dtNasci.getFullYear() + idadeForcada, `Ano de Vida: ${idadeForcada}`), dados: {} };
    } else {
        let htmlFinal = processarUmCiclo(anoBase, "Plano de Expressão Atual");
        htmlFinal += processarUmCiclo(anoBase + 1, "Próximo Ciclo de Expressão");
        return { html: htmlFinal, dados: {} };
    }
}

function calcularAptidaoProfissional(res) {
    // 1. Definição do número principal (usamos o Dia para o lado prático)
    const pilarPrincipal = reduzirPuro(res.dia);
    const pilares = [
        pilarPrincipal, 
        res.CaminhodeVida, 
        res.Propósito, 
        res.Personalidade
    ];
    
    let contagem = {};

    // 2. Mapeia a frequência de cada área (Lógica das Áreas de Atuação)
    pilares.forEach(num => {
        const areas = bancoAreasAtuacao[num] || [];
        areas.forEach(area => {
            contagem[area] = (contagem[area] || 0) + 1;
        });
    });

    let areasOrdenadas = Object.keys(contagem).map(area => {
        return { nome: area, pontos: contagem[area] };
    });

    // Ordenação Decrescente
    areasOrdenadas.sort((a, b) => b.pontos - a.pontos);

    // 3. CRIAÇÃO DAS VARIÁVEIS (O que estava faltando)
    let vocacaoMaster = areasOrdenadas.slice(0, 18).map(item => item.nome);
    let afinidade = areasOrdenadas.slice(18, 48).map(item => item.nome);

    // Busca ocupações CLT (Práticas)
    let caminhosPraticos = bancoOcupacoesPraticas[pilarPrincipal] || [];
    let listaCLT = caminhosPraticos.slice(0, 20).join(" • ");

    // Busca Estudos (Faculdade e Técnico)
    const estudos = bancoEstudos[pilarPrincipal] || { faculdades: [], cursosTecnicos: [] };

function analisarAptidaoPremium(res) {
    const pilares = [
        reduzirPuro(res.dia), 
        res.CaminhodeVida, 
        res.Propósito, 
        res.Personalidade
    ];

    let contagemAreas = {};

    pilares.forEach(num => {
        const areas = bancoAreasAtuacao[num] || [];
        areas.forEach(area => {
            contagemAreas[area] = (contagemAreas[area] || 0) + 1;
        });
    });

    // Filtramos áreas com 3+ (Vocação Master) e 2 (Afinidade)
    let vocacaoMaster = Object.keys(contagemAreas).filter(a => contagemAreas[a] >= 3);
    let afinidade = Object.keys(contagemAreas).filter(a => contagemAreas[a] === 2);

    return { vocacaoMaster, afinidade };
}


function formatarProfissoesSimples(res) {

    // Pegamos apenas as 2 primeiras para não espremer o layout
    const textoFinal = listaParaExibir.slice(0, 2).join(" • ");

}

function gerarCronogramaMensal(valorAnoPessoal, mesNascimento) {
    if (!valorAnoPessoal || !mesNascimento) {
        return "<p style='color:#666; text-align:center;'>Dados não localizados.</p>";
    }

    const nomesMeses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
    let htmlGerado = "";
    
    let anoBase = parseInt(valorAnoPessoal);
    let mesPartida = parseInt(mesNascimento) - 1; 

    for (let i = 0; i < 12; i++) {
        let indexMes = (mesPartida + i) % 12;
        let nomeMes = nomesMeses[indexMes];
        let numeroMesCivil = indexMes + 1;

        let numMP = anoBase + numeroMesCivil;
        while (numMP > 9 && numMP !== 11 && numMP !== 22) {
            numMP = String(numMP).split('').reduce((a, b) => parseInt(a) + parseInt(b), 0);
        }

        const dados = bancoMesPessoal[numMP];

        if (dados) {
            htmlGerado += `
            <div style="margin-bottom: 25px; border: 1px solid #d4af37; background: #fff; page-break-inside: avoid; border-radius: 8px; overflow: hidden;">
            
                <div style="background: #1a1a1a; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center;">
               
                    <strong style="color: #d4af37; text-transform: uppercase;">${nomeMes}</strong>
                    <span style="background: #d4af37; color: #1a1a1a; padding: 2px 10px; border-radius: 20px; font-weight: bold; font-size: 0.9rem;">MÊS PESSOAL ${numMP}</span>
                </div>
                
                <div style="padding: 15px; font-size: 1.2rem; line-height: 1.5; color: #333;">
                    <p style="color: #b8860b; font-weight: bold; font-size: 1.1rem; margin-bottom: 10px;">${dados.titulo}</p>
                    
                    <p style="margin-bottom: 8px;"><strong>👤 Pessoal:</strong> ${dados.pessoal}</p>
                    
                    <p style="margin-bottom: 8px;"><strong>❤️ Afetivo:</strong> ${dados.afetivo}</p>
                    
                    <p style="margin-bottom: 8px;"><strong>💼 Profissional:</strong> ${dados.profissional}</p>

    }
    return htmlGerado;
}

    // Ex: "DeSouza" -> "De Souza" | "Vanderlei" -> "Vanderlei" (permanece igual)

function calcularNumerosSocial(nome) {
    const tabelaBase = {
        'A': 1, 'B': 2, 'C': 3, 'D': 4, 'E': 5, 'F': 8, 'G': 3, 'H': 5,
        'I': 1, 'J': 1, 'K': 2, 'L': 3, 'M': 4, 'N': 5, 'O': 7, 'P': 8,
        'Q': 1, 'R': 2, 'S': 3, 'T': 4, 'U': 6, 'V': 6, 'W': 6, 'X': 6,
        'Y': 1, 'Z': 7
    };

    let totalMotivacao = 0; // Vogais
    let totalInfluencia = 0; // Consoantes
    
    const vogais = "AEIOUYÁÉÍÓÚÂÊÎÔÛÃÕÀÈÌÒÙÄËÏÖÜ";
    const nomeLimpo = nome.trim().toUpperCase();

    // Divide o nome em palavras para tratar cada letra e seus acentos
    for (let char of nomeLimpo) {
        if (char === " ") continue;

        let valorLetra = 0;
        let base = char.normalize("NFD")[0]; // Pega a letra sem acento
        
        if (tabelaBase[base]) {
            valorLetra = tabelaBase[base];

            // --- LÓGICA DE MODIFICADORES CABALÍSTICOS ---
            if (/[ÁÉÍÓÚ]/.test(char)) valorLetra += 2;
            if (/[ÃÕ]/.test(char)) valorLetra += 3;
            if (/[ÂÊÎÔÛ]/.test(char)) valorLetra += 7;
            if (char === "Ç") valorLetra += 3;
            if (/[ÀÈÌÒÙÄËÏÖÜ]/.test(char)) valorLetra *= 2; // Multiplicador (dobra)

            // Separação para Motivação e Influência
            if (vogais.includes(char)) {
                totalMotivacao += valorLetra;
            } else {
                totalInfluencia += valorLetra;
            }
        }
    }

    // Função interna para redução cabalística (mantém 11 e 22 se você usar, ou reduz tudo)
    const reduzir = (num) => {
        while (num > 9 && num !== 11 && num !== 22) {
            num = String(num).split('').reduce((a, b) => parseInt(a) + parseInt(b), 0);
        }
        return num;
    };

    const mot = reduzir(totalMotivacao);
    const inf = reduzir(totalInfluencia);
    const pers = reduzir(mot + inf);

    return {
        personalidade: pers,
        motivacao: mot,
        influencia: inf
    };
}

function calcularValorCabalisticoCompleto(letra) {
    if (!letra) return 0;
    const norm = letra.normalize("NFD");
    const base = norm[0].toUpperCase();
    const valorBase = tabela[base] || 0;
    if (!valorBase) return 0;

    let soma = 0, mult = 1;
    for (let i = 1; i < norm.length; i++) {
        const c = norm[i];
        if (c === "\u0301") soma += 2;          
        else if (c === "\u0302") soma += 7;     
        else if (c === "\u0303") soma += 3;     
        else if (c === "\u0327") soma += 3;     
        else if (c === "\u030a") soma += 7;     
        else if (c === "\u0300" || c === "\u0308") mult *= 2; 
    }
    if (letra.includes("'")) soma += 2;

    let resultadoBruto = (valorBase + soma) * mult;

    function reduzir(n) {
        if (n <= 9 || n === 11 || n === 22) return n;
        let s = n.toString().split('').reduce((acc, d) => acc + parseInt(d), 0);
        return reduzir(s);
    }
    return reduzir(resultadoBruto);
}

function calcularHabilidadeEspecialCientifica(nomeCompleto) {
    if (!nomeCompleto) return null;

    const contagemLetras = {};
    const nomeProcessado = nomeCompleto.toUpperCase();
    
    // 1. Contagem de frequência absoluta de cada letra/acento
    for (let letra of nomeProcessado) {
        if (letra.match(/[A-Z\u00C0-\u00FFÇ]/)) {
            contagemLetras[letra] = (contagemLetras[letra] || 0) + 1;
        }
    }

    // 2. Ordenar para identificar qual letra aparece MAIS vezes
    const ordenado = Object.entries(contagemLetras).sort((a, b) => b[1] - a[1]);
    
    if (ordenado.length === 0) return null;

    // A letra campeã é sempre a primeira da lista
    const letraDominante = ordenado[0][0];
    const maiorFreq = ordenado[0][1];

    // 3. Extrair os valores científicos da letra campeã
    const valorCabalistico = calcularValorLetra(letraDominante);
    
    // Redução para o índice do banco de textos (1-9)
    const numeroFinal = (valorCabalistico > 9) ? (valorCabalistico % 9 || 9) : valorCabalistico;

    // 4. Identificar Plano e Modo (Baseado na letra base)
    const letraBase = letraDominante.normalize("NFD")[0].toUpperCase();
    const modo = tabelaExpressao[letraBase] || 'neutro';
    
    let plano = "";
    for (let p in gruposPlanos) {
        if (gruposPlanos[p].includes(letraBase)) {
            plano = p;
            break;
        }
    }

    return {
        letraOriginal: letraDominante,
        numero: numeroFinal,
        plano: plano,
        modo: modo,
        frequencia: maiorFreq
    };
}
